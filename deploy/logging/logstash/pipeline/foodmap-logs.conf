input {
  kafka {
    bootstrap_servers => "${LOG_KAFKA_BROKERS:kafka:9092}"
    topics => [
      "foodmap.logs.application",
      "foodmap.logs.api-access",
      "foodmap.logs.sql",
      "foodmap.logs.audit",
      "foodmap.logs.security"
    ]
    group_id => "${LOGSTASH_LOG_GROUP_ID:foodmap-logstash-elasticsearch-local}"
    auto_offset_reset => "earliest"
    consumer_threads => 1
    decorate_events => true
    codec => json
  }
}

filter {
  if [@metadata][kafka][topic] == "foodmap.logs.application" {
    mutate { replace => { "logType" => "application" } }
  } else if [@metadata][kafka][topic] == "foodmap.logs.api-access" {
    mutate { replace => { "logType" => "api-access" } }
  } else if [@metadata][kafka][topic] == "foodmap.logs.sql" {
    mutate { replace => { "logType" => "sql" } }
  } else if [@metadata][kafka][topic] == "foodmap.logs.audit" {
    mutate { replace => { "logType" => "audit" } }
  } else if [@metadata][kafka][topic] == "foodmap.logs.security" {
    mutate { replace => { "logType" => "security" } }
  }

  if ![eventName] and [log] {
    grok {
      match => { "log" => "^(?<eventName>[A-Za-z0-9_.-]+)" }
      tag_on_failure => []
    }
  }

  if [timestamp] {
    date {
      match => [
        "timestamp",
        "ISO8601",
        "yyyy-MM-dd HH:mm:ss.SSS",
        "yyyy-MM-dd HH:mm:ss"
      ]
      target => "@timestamp"
      tag_on_failure => ["foodmap_timestamp_parse_failed"]
    }
  }

  mutate {
    add_field => {
      "logPipeline" => "foodmap-logstash-elasticsearch"
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
    index => "foodmap-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
    template_management => false
    retry_initial_interval => 2
    retry_max_interval => 30
  }
}

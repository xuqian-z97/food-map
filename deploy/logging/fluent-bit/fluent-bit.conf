[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    storage.path  /fluent-bit/state

[INPUT]
    Name              tail
    Tag               foodmap.raw
    Path              /foodmap/logs/*.log
    Read_from_Head    true
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /fluent-bit/state/foodmap-tail.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[FILTER]
    Name          parser
    Match         foodmap.raw
    Key_Name      log
    Parser        foodmap_json
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name   rewrite_tag
    Match  foodmap.raw
    Rule   $log .*api\.access\..* foodmap.api-access false
    Rule   $log .*sql\.execute\..* foodmap.sql false
    Rule   $log .*audit\..* foodmap.audit false
    Rule   $log .*security\..* foodmap.security false
    Emitter_Name foodmap_log_router

[OUTPUT]
    Name        kafka
    Match       foodmap.raw
    Brokers     ${KAFKA_BROKERS}
    Topics      foodmap.logs.application
    Format      json
    Retry_Limit False
    rdkafka.client.id foodmap-fluent-bit-application

[OUTPUT]
    Name        kafka
    Match       foodmap.api-access
    Brokers     ${KAFKA_BROKERS}
    Topics      foodmap.logs.api-access
    Format      json
    Retry_Limit False
    rdkafka.client.id foodmap-fluent-bit-api-access

[OUTPUT]
    Name        kafka
    Match       foodmap.sql
    Brokers     ${KAFKA_BROKERS}
    Topics      foodmap.logs.sql
    Format      json
    Retry_Limit False
    rdkafka.client.id foodmap-fluent-bit-sql

[OUTPUT]
    Name        kafka
    Match       foodmap.audit
    Brokers     ${KAFKA_BROKERS}
    Topics      foodmap.logs.audit
    Format      json
    Retry_Limit False
    rdkafka.client.id foodmap-fluent-bit-audit

[OUTPUT]
    Name        kafka
    Match       foodmap.security
    Brokers     ${KAFKA_BROKERS}
    Topics      foodmap.logs.security
    Format      json
    Retry_Limit False
    rdkafka.client.id foodmap-fluent-bit-security

spring:
  datasource:
    url: ${STORE_DB_URL:jdbc:postgresql://postgres:5432/${STORE_DB_NAME:foodmap_store_db}}
    username: ${STORE_DB_USERNAME:${POSTGRES_USER:foodmap}}
    password: ${STORE_DB_PASSWORD:${POSTGRES_PASSWORD:foodmap_dev_pwd}}
    hikari:
      pool-name: ${STORE_DB_POOL_NAME:foodmap-store-hikari}
      maximum-pool-size: ${STORE_DB_POOL_MAX_SIZE:${DB_POOL_MAX_SIZE:5}}
      minimum-idle: ${STORE_DB_POOL_MIN_IDLE:${DB_POOL_MIN_IDLE:1}}
      connection-timeout: ${STORE_DB_POOL_CONNECTION_TIMEOUT_MS:${DB_POOL_CONNECTION_TIMEOUT_MS:3000}}
      idle-timeout: ${STORE_DB_POOL_IDLE_TIMEOUT_MS:${DB_POOL_IDLE_TIMEOUT_MS:600000}}
      max-lifetime: ${STORE_DB_POOL_MAX_LIFETIME_MS:${DB_POOL_MAX_LIFETIME_MS:1800000}}
      leak-detection-threshold: ${STORE_DB_POOL_LEAK_DETECTION_MS:${DB_POOL_LEAK_DETECTION_MS:10000}}
  flyway:
    enabled: ${STORE_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}

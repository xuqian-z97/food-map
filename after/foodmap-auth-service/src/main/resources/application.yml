server:
  port: ${SERVER_PORT:8081}

logging:
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss:SSS"

spring:
  application:
    name: foodmap-auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}
  config:
    import:
      - optional:nacos:foodmap-logging-${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}.yml?refreshEnabled=true
      - optional:nacos:${spring.application.name}-${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}.yml?refreshEnabled=true
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_CONFIG_GROUP:FOODMAP}
        file-extension: yml
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
    openfeign:
      client:
        config:
          foodmap-user-service:
            connectTimeout: ${AUTH_USER_SERVICE_CONNECT_TIMEOUT_MS:3000}
            readTimeout: ${AUTH_USER_SERVICE_READ_TIMEOUT_MS:5000}
            loggerLevel: basic

foodmap:
  env:
    profile: ${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}
  auth:
    user-service:
      url: ${AUTH_USER_SERVICE_URL:}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info

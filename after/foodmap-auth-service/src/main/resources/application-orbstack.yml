spring:
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://postgres:5432/${AUTH_DB_NAME:foodmap_auth_db}}
    username: ${AUTH_DB_USERNAME:${POSTGRES_USER:foodmap}}
    password: ${AUTH_DB_PASSWORD:${POSTGRES_PASSWORD:foodmap_dev_pwd}}
    hikari:
      pool-name: ${AUTH_DB_POOL_NAME:foodmap-auth-hikari}
      maximum-pool-size: ${AUTH_DB_POOL_MAX_SIZE:${DB_POOL_MAX_SIZE:5}}
      minimum-idle: ${AUTH_DB_POOL_MIN_IDLE:${DB_POOL_MIN_IDLE:1}}
      connection-timeout: ${AUTH_DB_POOL_CONNECTION_TIMEOUT_MS:${DB_POOL_CONNECTION_TIMEOUT_MS:3000}}
      idle-timeout: ${AUTH_DB_POOL_IDLE_TIMEOUT_MS:${DB_POOL_IDLE_TIMEOUT_MS:600000}}
      max-lifetime: ${AUTH_DB_POOL_MAX_LIFETIME_MS:${DB_POOL_MAX_LIFETIME_MS:1800000}}
      leak-detection-threshold: ${AUTH_DB_POOL_LEAK_DETECTION_MS:${DB_POOL_LEAK_DETECTION_MS:10000}}
  flyway:
    enabled: ${AUTH_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}

foodmap:
  redis:
    redisson:
      enabled: ${FOODMAP_REDISSON_ENABLED:true}
      address: ${FOODMAP_REDISSON_ADDRESS:redis://redis:6379}
      password: ${FOODMAP_REDISSON_PASSWORD:${REDIS_PASSWORD:}}
      database: ${FOODMAP_REDISSON_DATABASE:0}
      connection-pool-size: ${FOODMAP_REDISSON_POOL_SIZE:8}
      connection-minimum-idle-size: ${FOODMAP_REDISSON_MIN_IDLE:1}
      connect-timeout: ${FOODMAP_REDISSON_CONNECT_TIMEOUT_MS:3000}
      timeout: ${FOODMAP_REDISSON_TIMEOUT_MS:2000}
      retry-attempts: ${FOODMAP_REDISSON_RETRY_ATTEMPTS:2}
      retry-interval: ${FOODMAP_REDISSON_RETRY_INTERVAL_MS:500}
      client-name: ${FOODMAP_REDISSON_CLIENT_NAME:foodmap-auth-redisson-orbstack}

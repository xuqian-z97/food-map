spring:
  datasource:
    url: ${COMMUNITY_DB_URL}
    username: ${COMMUNITY_DB_USERNAME}
    password: ${COMMUNITY_DB_PASSWORD}
    hikari:
      pool-name: ${COMMUNITY_DB_POOL_NAME:foodmap-community-hikari}
      maximum-pool-size: ${COMMUNITY_DB_POOL_MAX_SIZE:${DB_POOL_MAX_SIZE:5}}
      minimum-idle: ${COMMUNITY_DB_POOL_MIN_IDLE:${DB_POOL_MIN_IDLE:1}}
      connection-timeout: ${COMMUNITY_DB_POOL_CONNECTION_TIMEOUT_MS:${DB_POOL_CONNECTION_TIMEOUT_MS:5000}}
      idle-timeout: ${COMMUNITY_DB_POOL_IDLE_TIMEOUT_MS:${DB_POOL_IDLE_TIMEOUT_MS:600000}}
      max-lifetime: ${COMMUNITY_DB_POOL_MAX_LIFETIME_MS:${DB_POOL_MAX_LIFETIME_MS:1800000}}
      leak-detection-threshold: ${COMMUNITY_DB_POOL_LEAK_DETECTION_MS:${DB_POOL_LEAK_DETECTION_MS:60000}}
  flyway:
    enabled: ${COMMUNITY_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}

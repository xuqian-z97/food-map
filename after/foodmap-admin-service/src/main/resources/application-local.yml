spring:
  datasource:
    url: ${ADMIN_DB_URL:jdbc:postgresql://127.0.0.1:${POSTGRES_PORT:5432}/${ADMIN_DB_NAME:foodmap_admin_db}}
    username: ${ADMIN_DB_USERNAME:${POSTGRES_USER:foodmap}}
    password: ${ADMIN_DB_PASSWORD:${POSTGRES_PASSWORD:foodmap_dev_pwd}}
    hikari:
      pool-name: ${ADMIN_DB_POOL_NAME:foodmap-admin-hikari}
      maximum-pool-size: ${ADMIN_DB_POOL_MAX_SIZE:${DB_POOL_MAX_SIZE:5}}
      minimum-idle: ${ADMIN_DB_POOL_MIN_IDLE:${DB_POOL_MIN_IDLE:1}}
      connection-timeout: ${ADMIN_DB_POOL_CONNECTION_TIMEOUT_MS:${DB_POOL_CONNECTION_TIMEOUT_MS:3000}}
      idle-timeout: ${ADMIN_DB_POOL_IDLE_TIMEOUT_MS:${DB_POOL_IDLE_TIMEOUT_MS:600000}}
      max-lifetime: ${ADMIN_DB_POOL_MAX_LIFETIME_MS:${DB_POOL_MAX_LIFETIME_MS:1800000}}
      leak-detection-threshold: ${ADMIN_DB_POOL_LEAK_DETECTION_MS:${DB_POOL_LEAK_DETECTION_MS:10000}}
  flyway:
    enabled: ${ADMIN_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss:SSS"

spring:
  application:
    name: foodmap-gateway-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}
  config:
    import:
      - optional:nacos:foodmap-logging-${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}.yml?refreshEnabled=true
      - optional:nacos:${spring.application.name}-${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}.yml?refreshEnabled=true
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_CONFIG_GROUP:FOODMAP}
        file-extension: yml
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://foodmap-auth-service
          predicates:
            - Path=/api/auth/**,/internal/auth/**
        - id: user-service
          uri: lb://foodmap-user-service
          predicates:
            - Path=/api/users/**,/internal/users/**
        - id: relation-service
          uri: lb://foodmap-relation-service
          predicates:
            - Path=/api/friends/**,/api/couple/**,/internal/relations/**
        - id: store-service
          uri: lb://foodmap-store-service
          predicates:
            - Path=/api/stores/**,/internal/stores/**
        - id: recommendation-service
          uri: lb://foodmap-recommendation-service
          predicates:
            - Path=/api/recommendations/**,/internal/recommendations/**
        - id: community-service
          uri: lb://foodmap-community-service
          predicates:
            - Path=/api/community/**,/internal/community/**
        - id: media-service
          uri: lb://foodmap-media-service
          predicates:
            - Path=/api/media/**,/internal/media/**

foodmap:
  env:
    profile: ${SPRING_PROFILES_ACTIVE:${FOODMAP_PROFILE:local}}
  security:
    token-secret: ${FOODMAP_TOKEN_SECRET:foodmap-local-token-secret-please-change}

management:
  endpoints:
    web:
      exposure:
        include: health,info
